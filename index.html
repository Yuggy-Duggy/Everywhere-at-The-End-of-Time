<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everywhere at the End of Time</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@100;300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#c8a96e;--cream:#f0e8d8;--ash:#a09080;--void:#080604;--dust:#6a5a4a;}
html,body{width:100%;height:100%;background:var(--void);overflow:hidden;
  font-family:'Cormorant Garamond',Georgia,serif;cursor:none;}

#cur{position:fixed;pointer-events:none;z-index:9999;width:8px;height:8px;
  border-radius:50%;background:rgba(200,169,110,0.85);
  transform:translate(-50%,-50%);mix-blend-mode:screen;transition:opacity .4s;}
#cur-r{position:fixed;pointer-events:none;z-index:9998;width:34px;height:34px;
  border-radius:50%;border:1px solid rgba(200,169,110,0.22);
  transform:translate(-50%,-50%);}

#c{position:fixed;inset:0;display:block;}

#stage-ui{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:0 2rem 4rem;pointer-events:none;z-index:10;}
#stage-num{font-family:'Lato',sans-serif;font-weight:100;font-size:.58rem;
  letter-spacing:.75em;color:rgba(200,169,110,0.4);text-transform:uppercase;
  margin-bottom:.75rem;opacity:0;transition:opacity 1.8s ease;}
#stage-title{font-size:clamp(.9rem,2vw,1.35rem);font-weight:300;font-style:italic;
  letter-spacing:.07em;color:rgba(240,232,216,0.52);text-align:center;
  margin-bottom:.5rem;opacity:0;transition:opacity 1.8s ease;
  max-width:560px;line-height:1.6;}
#stage-sub{font-family:'Lato',sans-serif;font-weight:100;font-size:.56rem;
  letter-spacing:.5em;color:rgba(106,90,74,0.6);text-transform:uppercase;
  opacity:0;transition:opacity 1.8s ease;}

#progress-wrap{position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%);
  width:min(280px,50vw);height:1px;background:rgba(200,169,110,0.06);
  z-index:10;pointer-events:none;opacity:0;transition:opacity 2s ease;}
#progress-bar{height:100%;background:rgba(200,169,110,0.25);width:0%;
  transition:width .4s linear;}

#hint{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);
  font-family:'Lato',sans-serif;font-weight:100;font-size:.56rem;letter-spacing:.55em;
  color:rgba(200,169,110,0.28);text-transform:uppercase;pointer-events:none;
  z-index:12;opacity:0;transition:opacity 1.8s ease;text-align:center;}

/* Drifting word fragments */
.fword{position:fixed;pointer-events:none;z-index:8;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  color:rgba(200,169,110,0.1);white-space:nowrap;user-select:none;
  animation:wdrift var(--dur,11s) ease-in-out forwards;}
.fword.catchable{pointer-events:all;cursor:none;color:rgba(200,169,110,0.25);}
.fword.catchable:hover{color:rgba(240,220,155,0.65);
  text-shadow:0 0 24px rgba(200,169,110,0.45);}
@keyframes wdrift{
  0%{opacity:0;transform:translate(0,0) rotate(var(--r0,0deg));}
  14%{opacity:1;}82%{opacity:.07;}
  100%{opacity:0;transform:translate(var(--tx,0),var(--ty,-60px)) rotate(var(--r1,0deg));}}

/* Click ripple */
.ripple{position:fixed;pointer-events:none;z-index:14;border-radius:50%;
  border:1px solid rgba(200,169,110,0.35);transform:translate(-50%,-50%);
  animation:rout var(--rd,.9s) ease-out forwards;}
@keyframes rout{0%{width:4px;height:4px;opacity:.75;}
  100%{width:var(--rw,80px);height:var(--rw,80px);opacity:0;}}

/* Memory question — Stage IV */
#mem-q{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  z-index:20;text-align:center;opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;width:min(500px,80vw);}
#mem-q .qtext{font-size:clamp(.95rem,1.8vw,1.25rem);font-weight:300;font-style:italic;
  color:rgba(240,232,216,0.42);letter-spacing:.06em;line-height:2;margin-bottom:1.2rem;}
#mem-q .opts{display:flex;flex-wrap:wrap;gap:.55rem;justify-content:center;}
#mem-q .opt{font-family:'Lato',sans-serif;font-weight:100;font-size:.68rem;
  letter-spacing:.3em;color:rgba(200,169,110,0.45);cursor:none;pointer-events:all;
  padding:.25rem .8rem;border:1px solid rgba(200,169,110,0.14);
  transition:color .3s,border-color .3s,transform .25s;}
#mem-q .opt:hover{color:rgba(240,218,150,0.85);border-color:rgba(200,169,110,0.45);
  transform:scale(1.04);}

/* Typewriter — Stage V */
#tw-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:20;text-align:center;opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;width:min(520px,82vw);}
#tw-prompt{font-family:'Lato',sans-serif;font-weight:100;font-size:.56rem;
  letter-spacing:.55em;color:rgba(200,169,110,0.3);text-transform:uppercase;
  margin-bottom:1.3rem;}
#tw-display{font-size:clamp(.95rem,1.9vw,1.25rem);font-weight:300;font-style:italic;
  color:rgba(240,232,216,0.38);letter-spacing:.05em;line-height:2;
  min-height:2.8rem;border-bottom:1px solid rgba(200,169,110,0.1);
  padding-bottom:.4rem;word-break:break-word;}
#tw-display::after{content:'|';animation:blink 1.1s step-end infinite;
  color:rgba(200,169,110,0.35);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
#tw-hidden{position:fixed;opacity:0;top:-999px;left:-999px;pointer-events:none;}

#flash{position:fixed;inset:0;background:#f0e8d8;opacity:0;pointer-events:none;z-index:50;}

/* Gate */
#gate{position:fixed;inset:0;z-index:100;background:var(--void);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;}
.gl{font-size:clamp(.88rem,1.9vw,1.12rem);font-weight:300;font-style:italic;
  color:var(--ash);text-align:center;line-height:2.1;max-width:460px;
  opacity:0;transform:translateY(7px);transition:opacity 1.4s ease,transform 1.4s ease;
  margin-bottom:.1rem;}
.gl.s{opacity:1;transform:none;}
.gbtn{margin-top:3.5rem;padding:.9rem 2.8rem;
  border:1px solid rgba(200,169,110,0.22);background:transparent;
  color:var(--gold);font-family:'Lato',sans-serif;font-weight:100;
  font-size:.62rem;letter-spacing:.65em;text-transform:uppercase;
  cursor:none;opacity:0;transition:opacity 1s ease,border-color .4s,color .4s;}
.gbtn.s{opacity:1;}
.gbtn:hover{border-color:rgba(200,169,110,.6);color:#e8d5b0;}
.gwarn{margin-top:1.8rem;font-family:'Lato',sans-serif;font-weight:100;
  font-size:.5rem;letter-spacing:.32em;color:rgba(106,90,74,0.42);text-transform:uppercase;
  opacity:0;transition:opacity 1s ease 1s;}
.gwarn.s{opacity:1;}

/* Harry / Credits overlay — canvas handles drawing, this just hosts the restart btn */
#fin{position:fixed;inset:0;z-index:200;pointer-events:none;background:transparent;}
#fin-canvas{position:fixed;inset:0;z-index:201;pointer-events:none;display:none;}
#fin-btn{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);
  z-index:202;padding:.7rem 2.2rem;border:1px solid rgba(200,169,110,.15);
  background:transparent;color:var(--dust);font-family:'Lato',sans-serif;font-weight:100;
  font-size:.56rem;letter-spacing:.55em;text-transform:uppercase;cursor:none;
  opacity:0;transition:opacity 1.5s ease,color .3s;pointer-events:none;}
#fin-btn:hover{color:var(--ash);}
#fin-btn.s{opacity:.35;pointer-events:all;}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-r"></div>
<div id="flash"></div>
<canvas id="c"></canvas>

<div id="stage-ui">
  <div id="stage-num"></div>
  <div id="stage-title"></div>
  <div id="stage-sub"></div>
</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="hint"></div>
<div id="mem-q"><div class="qtext"></div><div class="opts"></div></div>
<div id="tw-wrap">
  <div id="tw-prompt">tell me something you remember</div>
  <div id="tw-display"></div>
</div>
<input id="tw-hidden" type="text" autocomplete="off" spellcheck="false" tabindex="-1">

<div id="gate">
  <p class="gl" id="g0">A ballroom. Music playing.</p>
  <p class="gl" id="g1">It was always playing.</p>
  <p class="gl" id="g2">You knew every song. You knew every face.</p>
  <p class="gl" id="g3">This is a record of what remains.</p>
  <button class="gbtn" id="gbtn">Begin the Experience</button>
  <p class="gwarn">headphones recommended &nbsp;·&nbsp; audio will play &nbsp;·&nbsp; ~5 minutes</p>
</div>

<div id="fin">
  <canvas id="fin-canvas"></canvas>
  <button id="fin-btn" onclick="location.reload()">Return to the Beginning</button>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
// CURSOR with frame-history lag
// ═══════════════════════════════════════════════════════
const curEl = document.getElementById('cur');
const curREl = document.getElementById('cur-r');
let rawMx = innerWidth/2, rawMy = innerHeight/2;
let lagFrames = 0, curLerp = 0.15, curHidden = false;
const HLEN = 90;
const mxH = new Float32Array(HLEN).fill(rawMx);
const myH = new Float32Array(HLEN).fill(rawMy);
let hIdx = 0, rx = rawMx, ry = rawMy;

document.addEventListener('mousemove', e => {
  rawMx = e.clientX; rawMy = e.clientY;
  hIdx = (hIdx + 1) % HLEN;
  mxH[hIdx] = rawMx; myH[hIdx] = rawMy;
});

(function curLoop() {
  const ri = (hIdx - Math.min(lagFrames, HLEN - 1) + HLEN) % HLEN;
  const tx = lagFrames ? mxH[ri] : rawMx;
  const ty = lagFrames ? myH[ri] : rawMy;
  rx += (tx - rx) * curLerp; ry += (ty - ry) * curLerp;
  curEl.style.left = rawMx + 'px'; curEl.style.top = rawMy + 'px';
  curREl.style.left = rx + 'px'; curREl.style.top = ry + 'px';
  curEl.style.opacity = curHidden ? '0' : '1';
  curREl.style.opacity = curHidden ? '0' : '1';
  requestAnimationFrame(curLoop);
})();

// ═══════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); buildGrainBuffer(); });

// Pre-baked grain buffer for performance
let grainBuf = null, grainCtx = null;
function buildGrainBuffer() {
  if (!grainBuf) { grainBuf = document.createElement('canvas'); grainCtx = grainBuf.getContext('2d'); }
  grainBuf.width = W; grainBuf.height = H;
}
function refreshGrain(amount) {
  if (amount < 0.01 || !grainCtx) return;
  const id = grainCtx.createImageData(W, H);
  const d = id.data;
  const step = Math.max(1, Math.floor(6 - amount * 4));
  for (let i = 0; i < d.length; i += 4 * step) {
    const v = (Math.random() * 200) | 0;
    const a = (Math.random() * 140 * amount) | 0;
    d[i] = d[i+1] = d[i+2] = v; d[i+3] = a;
  }
  grainCtx.putImageData(id, 0, 0);
}

// ═══════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════
let AC = null, masterGain, rvWet, rvDry, distWS;
let melTimer = null, noiseNode = null, crackTimer = null;

const ROOT = 130.81; // C3
const MOTIF = [0, 4, 7, 12, 7, 4, 0, -3, 0, 4, 7, 4, 0, 7, 11, 12];
const PENT  = [0, 3, 5, 7, 10, 12, 15, 17];

function semiHz(s, root, pitchShift) {
  return (root || ROOT) * Math.pow(2, (s + (pitchShift || 0)) / 12);
}

function makeIR(ctx, decay, wetAmt) {
  const sr = ctx.sampleRate, len = (sr * decay) | 0;
  const buf = ctx.createBuffer(2, len, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 2.1);
  }
  const conv = ctx.createConvolver(); conv.buffer = buf;
  const wg = ctx.createGain(); wg.gain.value = wetAmt;
  const dg = ctx.createGain(); dg.gain.value = 1 - wetAmt * 0.55;
  const out = ctx.createGain();
  conv.connect(wg); wg.connect(out); dg.connect(out);
  return { input: dg, out, wg, dg };
}

function distCurve(amt) {
  const n = 512, c = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    c[i] = amt > 0 ? (Math.PI + amt) * x / (Math.PI + amt * Math.abs(x)) : x;
  }
  return c;
}

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = AC.createGain(); masterGain.gain.value = 0;
  masterGain.connect(AC.destination);
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -20; comp.knee.value = 10;
  comp.ratio.value = 5; comp.attack.value = 0.004; comp.release.value = 0.18;
  comp.connect(masterGain);
  distWS = AC.createWaveShaper();
  distWS.curve = distCurve(0); distWS.oversample = '4x';
  distWS.connect(comp);
  const rv = makeIR(AC, 5.5, 0.28);
  rv.out.connect(distWS);
  rvWet = rv.wg; rvDry = rv.dg;
}

function playTone(freq, vol, dur, type, detune) {
  if (!AC) return;
  const osc = AC.createOscillator();
  osc.type = type || 'sine'; osc.frequency.value = freq;
  if (detune) osc.detune.value = (Math.random() - 0.5) * detune;
  const eg = AC.createGain();
  eg.gain.setValueAtTime(0, AC.currentTime);
  eg.gain.linearRampToValueAtTime(vol, AC.currentTime + 0.06);
  eg.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  osc.connect(eg); eg.connect(rvDry);
  osc.start(); osc.stop(AC.currentTime + dur + 0.15);
}

function playChord(root, semis, vol, dur) {
  semis.forEach((s, i) => setTimeout(() => playTone(semiHz(s, root), vol * (1 - i * 0.14), dur, 'sine', 8), i * 55));
}

function playNoiseBurst(dur, vol) {
  if (!AC) return;
  const len = (AC.sampleRate * dur) | 0;
  const nb = AC.createBuffer(1, len, AC.sampleRate);
  const d = nb.getChannelData(0); for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = nb;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 300 + Math.random() * 2500; bp.Q.value = 0.6;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  src.connect(bp); bp.connect(g); g.connect(rvDry);
  src.start(); src.stop(AC.currentTime + dur + 0.05);
}

function startNoise(level) {
  if (!AC || noiseNode) return;
  const len = AC.sampleRate * 3;
  const nb = AC.createBuffer(1, len, AC.sampleRate);
  const d = nb.getChannelData(0); for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  noiseNode = AC.createBufferSource(); noiseNode.buffer = nb; noiseNode.loop = true;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 700;
  const g = AC.createGain(); g.gain.value = level * 0.09;
  noiseNode.connect(lp); lp.connect(g); g.connect(rvDry);
  noiseNode.start();
}
function stopNoise() { if (noiseNode) { try { noiseNode.stop(); } catch(e){} noiseNode = null; } }

function crackle(vol) {
  if (!AC) return;
  const osc = AC.createOscillator(); osc.type = 'sawtooth';
  osc.frequency.value = 2000 + Math.random() * 9000;
  const eg = AC.createGain(); const v = (vol || 1) * (0.003 + Math.random() * 0.007);
  eg.gain.setValueAtTime(v, AC.currentTime);
  eg.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 0.01 + Math.random() * 0.05);
  osc.connect(eg); eg.connect(rvDry);
  osc.start(); osc.stop(AC.currentTime + 0.07);
}

// ═══════════════════════════════════════════════════════
// STAGE DATA
// ═══════════════════════════════════════════════════════
const STAGES = [
  { num:'Stage I',   title:'It is just a burning memory',             sub:'Daydream — the last beautiful days',
    dur:40000, clarity:1.0, grain:0.012, cs:0.0,  mel:1.0, noise:0.0,  rev:0.25, tempo:1.00, pitch:0,   det:6,
    lag:0, lerp:0.18, hint:'touch the world — it still remembers you',   mode:'full' },
  { num:'Stage II',  title:'A losing battle is raging',               sub:'Denial — first hesitations',
    dur:42000, clarity:0.76, grain:0.06, cs:0.1,  mel:0.76, noise:0.06, rev:0.50, tempo:0.97, pitch:-0.5, det:35,
    lag:0, lerp:0.13, hint:'hold on to what you know',                    mode:'partial' },
  { num:'Stage III', title:'Sublime beyond loss',                     sub:'Reality — the ballroom empties',
    dur:44000, clarity:0.50, grain:0.14, cs:0.28, mel:0.44, noise:0.18, rev:0.70, tempo:0.93, pitch:-1.5, det:85,
    lag:3, lerp:0.10, hint:'catch them — before they fall',               mode:'catch' },
  { num:'Stage IV',  title:'Post awareness confusions',               sub:'Rupture — the self unravels',
    dur:44000, clarity:0.27, grain:0.30, cs:0.55, mel:0.18, noise:0.40, rev:0.87, tempo:0.85, pitch:-3,   det:200,
    lag:18, lerp:0.04, hint:'what is her name',                           mode:'question' },
  { num:'Stage V',   title:'Sudden time regression into isolation',   sub:'Horror — only static remains',
    dur:42000, clarity:0.08, grain:0.56, cs:0.80, mel:0.05, noise:0.72, rev:0.95, tempo:0.72, pitch:-6,   det:320,
    lag:36, lerp:0.03, hint:'',                                            mode:'typewriter' },
  { num:'Stage VI',  title:'Place in the world fades away',           sub:'Nothing — the last ember',
    dur:40000, clarity:0.0,  grain:0.90, cs:1.0,  mel:0.0,  noise:0.96, rev:1.0,  tempo:0.55, pitch:-12,  det:450,
    lag:55, lerp:0.02, hint:'',                                            mode:'none' },
];

// ═══════════════════════════════════════════════════════
// SCENE STATE
// ═══════════════════════════════════════════════════════
let sIdx = 0, sElapsed = 0, gt = 0, running = false, inTransition = false;
let dancers = [], motes = [], ghosts = [];
let wordTimer = null, catchTimer = null;

// ═══════════════════════════════════════════════════════
// SCENE INIT
// ═══════════════════════════════════════════════════════
function initScene() {
  // Dancers — pairs waltzing in lower half of screen
  dancers = [];
  const pairs = 4;
  for (let p = 0; p < pairs; p++) {
    const cx = 0.15 + (p / pairs) * 0.72 + (Math.random() - 0.5) * 0.08;
    const cy = 0.62 + Math.random() * 0.18; // LOWER half — on the floor
    for (let side = 0; side < 2; side++) {
      dancers.push({
        cx, cy,        // base position (0-1 of W/H)
        side,          // 0=lead, 1=follow
        orbitR: 0.028 + Math.random() * 0.018,
        speed:  (0.4 + Math.random() * 0.5) * (Math.random() < 0.5 ? 1 : -1),
        phase:  Math.random() * Math.PI * 2 + side * Math.PI,
        glowing: 0, spin: 0,
        spinAngle: 0,   // accumulated rotation (radians)
        spinVel:   0,   // angular velocity — imparted on click
        spinDir:   1,   // last click direction (±1)
        clickCount: 0,  // how many times clicked total
        alive: true,
        id: p * 2 + side,
      });
    }
  }

  // Atmospheric motes
  motes = [];
  for (let i = 0; i < 70; i++) {
    motes.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2,
      r: 0.6 + Math.random() * 2.2, life: Math.random(), ph: Math.random() * Math.PI * 2,
    });
  }

  // Ghost geometry — abstract shapes that emerge in later stages
  ghosts = [];
  const gt2 = ['rect','ellipse','line'];
  for (let i = 0; i < 16; i++) {
    ghosts.push({
      x: 0.06 + Math.random() * 0.88, y: 0.06 + Math.random() * 0.88,
      w: 0.04 + Math.random() * 0.15, h: 0.07 + Math.random() * 0.17,
      op: 0, tgt: 0, ph: Math.random() * Math.PI * 2, type: gt2[i % 3],
    });
  }
}

// ═══════════════════════════════════════════════════════
// DRAW: BACKGROUND + FLOOR
// ═══════════════════════════════════════════════════════
function drawBg(s) {
  // Rich dark background with subtle warm undertone
  const r = Math.max(3, 14 - s.cs * 10);
  const g = Math.max(2, 9 - s.cs * 6);
  const b = Math.max(1, 5 - s.cs * 3);
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, W, H);
}

function drawFloor(s) {
  if (s.clarity < 0.04) return;
  const cx = W / 2;
  // Horizon sits at ~55% height — dancers appear below this
  const hy = H * 0.55;
  const ROWS = 14, COLS = 18;
  const gw = W * 2.2;

  // Draw tiles row by row — perspective projection
  for (let r = 0; r < ROWS; r++) {
    const v = (r + 1) / ROWS; // 0=horizon, 1=foreground
    const rowY = hy + v * (H - hy);
    const nextRowY = hy + ((r + 2) / ROWS) * (H - hy);
    const scale = 0.15 + v * 1.1;
    const rowW = gw * scale;
    const th = nextRowY - rowY;

    for (let c = 0; c < COLS; c++) {
      const u = (c - COLS / 2 + 0.5) / COLS; // -0.5..0.5
      const x = cx + u * rowW;
      const tw = rowW / COLS;
      const dark = (r + c) % 2 === 0;
      const base = dark ? 9 : 20;
      const sh = s.cs * 20;
      // Warp tiles in later stages
      const warp = s.cs > 0.25 ? Math.sin(gt * 0.55 + r * 0.8 + c * 0.6) * s.cs * 14 : 0;
      // Fade out at edges, fade in with clarity
      const edgeFade = Math.max(0, 1 - Math.abs(u) * 1.8);
      const alpha = s.clarity * edgeFade * (0.35 + v * 0.65);
      if (alpha < 0.008) continue;
      ctx.fillStyle = `rgba(${(base + sh * 0.3) | 0},${Math.max(0,(base - sh * 0.5)) | 0},${Math.max(0,(base - sh)) | 0},${alpha.toFixed(3)})`;
      ctx.fillRect((x - tw / 2 + warp) | 0, rowY | 0, (tw - 0.5) | 0, (th + 0.5) | 0);
    }
  }

  // Horizon atmospheric haze
  if (s.clarity > 0.08) {
    const haze = ctx.createLinearGradient(0, hy - 40, 0, hy + 80);
    haze.addColorStop(0, `rgba(200,169,110,0)`);
    haze.addColorStop(0.4, `rgba(200,169,110,${s.clarity * 0.08})`);
    haze.addColorStop(1, `rgba(0,0,0,0)`);
    ctx.fillStyle = haze;
    ctx.fillRect(0, hy - 40, W, 120);
  }
}

// ═══════════════════════════════════════════════════════
// DRAW: CHANDELIER
// ═══════════════════════════════════════════════════════
function drawChandelier(s) {
  if (s.clarity < 0.1) return;
  const ca = Math.min(1, (s.clarity - 0.1) / 0.7);
  const cx = W / 2, cy = H * 0.06;

  // Warm ceiling glow pool
  const pool = ctx.createRadialGradient(cx, cy * 2, 0, cx, cy * 2, H * 0.55);
  pool.addColorStop(0, `rgba(200,169,110,${ca * 0.42})`);
  pool.addColorStop(0.4, `rgba(160,120,60,${ca * 0.1})`);
  pool.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = pool;
  ctx.fillRect(0, 0, W, H * 0.55);

  // Central boss
  ctx.beginPath();
  ctx.arc(cx, cy, H * 0.012, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(220,190,120,${ca * 0.65})`;
  ctx.fill();

  // Arms + bulbs — 6 arms
  ctx.lineWidth = 0.7;
  for (let a = 0; a < 6; a++) {
    const ang = (a / 6) * Math.PI * 2 + gt * 0.006 + Math.sin(gt * 0.38) * s.noise * 0.25;
    const arm1 = H * 0.025, arm2 = H * 0.092 + Math.sin(gt * 0.45 + a) * H * 0.006 * (1 - s.cs * 0.4);
    const bx = cx + Math.cos(ang) * arm2;
    const by = cy + Math.sin(ang) * arm2 * 0.28 + arm2 * 0.1;

    // Arm line
    ctx.strokeStyle = `rgba(200,169,110,${ca * 0.32})`;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(ang) * arm1, cy + Math.sin(ang) * arm1 * 0.28);
    ctx.lineTo(bx, by); ctx.stroke();

    // Bulb flicker — more erratic in later stages
    const flicker = 0.42 + 0.58 * Math.abs(Math.sin(gt * 3.6 + a * 1.5 + s.noise * (Math.random() * 4)));
    // Bulb
    ctx.beginPath();
    ctx.arc(bx, by, H * 0.006, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(245,215,145,${ca * 0.6 * flicker})`;
    ctx.fill();
    // Bulb glow
    if (s.clarity > 0.3) {
      const bg = ctx.createRadialGradient(bx, by, 0, bx, by, H * 0.05);
      bg.addColorStop(0, `rgba(220,180,100,${ca * 0.22 * flicker})`);
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg;
      ctx.fillRect(bx - H * 0.06, by - H * 0.06, H * 0.12, H * 0.12);
    }
  }
}

// ═══════════════════════════════════════════════════════
// DRAW: DANCERS — full visible humanoid silhouettes
// ═══════════════════════════════════════════════════════
function drawDancers(s) {
  // Scale: about 8% of screen height — clearly visible
  const BASE_H = H * 0.055;

  dancers.forEach((d, i) => {
    if (!d.alive) return;

    // Update orbital waltz motion — base speed + any active boost
    const baseSpeed = 0.007 * STAGES[sIdx].tempo * (1 + s.noise * 0.4);
    d.boost = Math.max(0, (d.boost || 0) - 0.0008); // boost decays gradually
    d.phase += baseSpeed + d.boost;
    d.glowing = Math.max(0, d.glowing - 0.018);

    // Compute world position
    const ox = d.orbitR * W * Math.cos(d.phase + d.side * Math.PI);
    const oy = d.orbitR * H * Math.sin(d.phase + d.side * Math.PI) * 0.35;

    // Stage chaos wobble
    const chaosMag = s.noise * 18;
    const wx = chaosMag * Math.sin(gt * 2.2 + d.id * 1.9 + 0.7);
    const wy = chaosMag * Math.cos(gt * 1.7 + d.id * 2.5 + 0.3);

    const px = d.cx * W + ox + wx;
    const py = d.cy * H + oy + wy;

    // Silhouette alpha — well above threshold
    // Base opacity from clarity, boosted significantly, plus glow contribution
    const baseAlpha = 0.55 + s.clarity * 0.35; // 0.55 at clarity=0, 0.90 at clarity=1
    const finalAlpha = Math.min(0.92, baseAlpha + d.glowing * 0.6);
    if (finalAlpha < 0.04) return;

    // Colour shifts from warm gold → desaturated grey/violet as stage progresses
    const ri = Math.max(0, 175 - s.cs * 100) | 0;
    const gi = Math.max(0, 135 - s.cs * 90) | 0;
    const bi = Math.max(0, 75  + s.cs * 60) | 0;

    ctx.save();
    ctx.translate(px, py);
    // Natural waltz sway only — spin is orbital, not axial
    const sway = Math.sin(gt * 0.85 + d.phase) * 0.04;
    ctx.rotate(sway);

    const sh = BASE_H; // silhouette height ref

    // ── GLOW HALO (drawn first, behind body) ─────────────────
    if (d.glowing > 0.05 || s.clarity > 0.5) {
      const haloR = sh * (d.glowing > 0.05 ? 2.8 + d.glowing * 2 : 1.8);
      const haloA = d.glowing > 0.05 ? d.glowing * 0.45 : s.clarity * 0.06;
      const hg = ctx.createRadialGradient(0, 0, 0, 0, 0, haloR);
      hg.addColorStop(0, `rgba(220,190,120,${haloA})`);
      hg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = hg;
      ctx.fillRect(-haloR, -haloR, haloR * 2, haloR * 2);
    }

    // ── BODY FILL ─────────────────────────────────────────────
    ctx.fillStyle = `rgba(${ri},${gi},${bi},${finalAlpha})`;

    // Head
    const headR = sh * 0.14;
    const headY = -sh * 0.78;
    ctx.beginPath();
    ctx.arc(0, headY, headR, 0, Math.PI * 2);
    ctx.fill();

    // Neck
    ctx.fillRect(-sh * 0.05, headY + headR, sh * 0.10, sh * 0.08);

    // Torso — tapered trapezoid
    ctx.beginPath();
    ctx.moveTo(-sh * 0.18, headY + headR + sh * 0.08);
    ctx.lineTo( sh * 0.18, headY + headR + sh * 0.08);
    ctx.lineTo( sh * 0.13, headY + headR + sh * 0.08 + sh * 0.38);
    ctx.lineTo(-sh * 0.13, headY + headR + sh * 0.08 + sh * 0.38);
    ctx.closePath();
    ctx.fill();

    const waistY = headY + headR + sh * 0.46 + sh * 0.08;

    // Waltz arms — one raised, one extended (mirrored for lead/follow)
    const armSwing = Math.sin(gt * 0.88 + d.phase) * 0.55;
    const armDir   = d.side === 0 ? 1 : -1;

    // Leading arm (raised)
    ctx.save();
    ctx.translate(sh * 0.18 * armDir, headY + headR + sh * 0.14);
    ctx.rotate(armDir * (-0.7 + armSwing * 0.5));
    ctx.fillRect(-sh * 0.05, 0, sh * 0.10, sh * 0.34);
    // Forearm
    ctx.translate(0, sh * 0.34);
    ctx.rotate(armDir * 0.6);
    ctx.fillRect(-sh * 0.04, 0, sh * 0.08, sh * 0.27);
    ctx.restore();

    // Following arm (lower / extended)
    ctx.save();
    ctx.translate(-sh * 0.18 * armDir, headY + headR + sh * 0.2);
    ctx.rotate(armDir * (0.45 + armSwing * 0.35));
    ctx.fillRect(-sh * 0.04, 0, sh * 0.09, sh * 0.3);
    ctx.translate(0, sh * 0.3);
    ctx.rotate(armDir * -0.45);
    ctx.fillRect(-sh * 0.035, 0, sh * 0.07, sh * 0.24);
    ctx.restore();

    // Hips / skirt (lead has trousers, follow has skirt bell)
    if (d.side === 1) {
      // Skirt — flared triangle with waltz rotation
      const skirtFlare = sh * 0.24 + Math.sin(gt * 1.1 + d.phase) * sh * 0.04;
      ctx.beginPath();
      ctx.moveTo(-sh * 0.13, waistY);
      ctx.lineTo( sh * 0.13, waistY);
      ctx.lineTo( skirtFlare, waistY + sh * 0.38);
      ctx.lineTo(-skirtFlare, waistY + sh * 0.38);
      ctx.closePath();
      ctx.fill();
      // Legs below skirt
      const legY = waistY + sh * 0.38;
      const legSwing = Math.sin(gt * 0.9 + d.phase) * 0.18;
      ctx.save(); ctx.rotate(legSwing);
      ctx.fillRect(-sh * 0.07, legY, sh * 0.11, sh * 0.28); ctx.restore();
      ctx.save(); ctx.rotate(-legSwing);
      ctx.fillRect(-sh * 0.04, legY, sh * 0.11, sh * 0.28); ctx.restore();
    } else {
      // Trousers — two separate legs
      const legSwing = Math.sin(gt * 0.9 + d.phase) * 0.22;
      ctx.save(); ctx.rotate(legSwing);
      ctx.fillRect(-sh * 0.13, waistY, sh * 0.10, sh * 0.44); ctx.restore();
      ctx.save(); ctx.rotate(-legSwing);
      ctx.fillRect( sh * 0.03, waistY, sh * 0.10, sh * 0.44); ctx.restore();
    }

    // ── DISSOLUTION EFFECT: Stage 3+ scatters pixels ─────────
    if (s.cs > 0.25 && Math.random() < s.cs * 0.6) {
      const particleCount = (s.cs * 6) | 0;
      for (let p = 0; p < particleCount; p++) {
        const px2 = (Math.random() - 0.5) * sh * 2.5;
        const py2 = (Math.random() - 0.5) * sh * 2.5;
        const pr  = sh * 0.03 + Math.random() * sh * 0.06;
        const pa  = (0.1 + Math.random() * 0.25) * (1 - s.cs * 0.5);
        ctx.fillStyle = `rgba(${ri},${gi},${bi},${pa})`;
        ctx.beginPath(); ctx.arc(px2, py2, pr, 0, Math.PI * 2); ctx.fill();
      }
    }

    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════
// DRAW: ATMOSPHERIC MOTES
// ═══════════════════════════════════════════════════════
function drawMotes(s) {
  motes.forEach(m => {
    m.x += m.vx * (1 + s.noise * 0.8);
    m.y += m.vy * (1 + s.noise * 0.8);
    m.life += 0.003 + s.noise * 0.002;
    if (m.x < -10 || m.x > W + 10 || m.y < -10 || m.y > H + 10 || m.life > 1) {
      m.x = Math.random() * W; m.y = Math.random() * H;
      m.vx = (Math.random() - 0.5) * 0.3; m.vy = (Math.random() - 0.5) * 0.2;
      m.life = 0;
    }
    const a = Math.sin(m.life * Math.PI) * (s.clarity * 0.12 + 0.03);
    if (a < 0.005) return;
    const hsh = s.cs * 55;
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${(200 - hsh * 0.5) | 0},${(165 - hsh * 0.7) | 0},${(105 - hsh * 0.4) | 0},${a.toFixed(3)})`;
    ctx.fill();
  });
}

// ═══════════════════════════════════════════════════════
// DRAW: GHOST GEOMETRY (late stages)
// ═══════════════════════════════════════════════════════
function drawGhosts(s) {
  // Start appearing from Stage II onward
  const strength = Math.max(0, (s.noise - 0.03) / 0.97);
  if (strength < 0.01) return;

  ghosts.forEach((g, i) => {
    g.tgt = strength * 0.5 * (0.5 + 0.5 * Math.sin(gt * 0.32 + g.ph + i * 0.78));
    g.op += (g.tgt - g.op) * 0.016;
    if (g.op < 0.006) return;

    const gx = g.x * W + Math.sin(gt * 0.27 + i) * s.noise * 24;
    const gy = g.y * H + Math.cos(gt * 0.21 + i) * s.noise * 16;
    const gw = g.w * W, gh = g.h * H;
    const hsh = s.cs * 48;

    ctx.save();
    ctx.globalAlpha = g.op;
    ctx.strokeStyle = `rgba(${(165 - hsh * 0.5) | 0},${(105 - hsh * 0.8) | 0},${(45 - hsh * 0.3) | 0},1)`;
    ctx.lineWidth = 0.4 + s.noise * 0.9;

    if (g.type === 'rect') {
      ctx.strokeRect(gx, gy, gw, gh);
    } else if (g.type === 'ellipse') {
      ctx.beginPath();
      ctx.ellipse(gx + gw / 2, gy + gh / 2, gw / 2, gh / 2, Math.sin(gt * 0.07 + i) * 0.5, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx + gw, gy + gh); ctx.stroke();
    }
    ctx.globalAlpha = 1.0; // ALWAYS reset
    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════
// DRAW: MEMORY SMEAR (Stage 3+)
// ═══════════════════════════════════════════════════════
function drawSmear(s) {
  if (s.cs < 0.22) return;
  const n = (s.cs * 10) | 0;
  for (let i = 0; i < n; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const len = 50 + Math.random() * 200, ang = Math.random() * Math.PI * 2;
    const x2 = x + Math.cos(ang) * len, y2 = y + Math.sin(ang) * len;
    const sg = ctx.createLinearGradient(x, y, x2, y2);
    const hsh = s.cs * 45;
    sg.addColorStop(0, `rgba(${(135 - hsh * 0.4) | 0},${(85 - hsh * 0.5) | 0},30,${s.cs * 0.048})`);
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    const mx2 = Math.min(x, x2), my2 = Math.min(y, y2);
    ctx.fillRect(mx2 - 12, my2 - 12, Math.abs(x2 - x) + 24, Math.abs(y2 - y) + 24);
  }
}

// ═══════════════════════════════════════════════════════
// DRAW: SCANLINES
// ═══════════════════════════════════════════════════════
function drawScanlines(s) {
  if (s.noise < 0.04) return;
  ctx.fillStyle = `rgba(0,0,0,${s.noise * 0.18})`;
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1.5);
}

// ═══════════════════════════════════════════════════════
// DRAW: VOID PULSE (Stage 5-6)
// ═══════════════════════════════════════════════════════
function drawVoid(s, sp) {
  const phase = Math.max(0, (sIdx - 3.5) / 2.5);
  if (phase < 0.01) return;
  const r = Math.min(W, H) * (0.3 + Math.sin(gt * 0.38) * 0.15 + phase * 0.35);
  const vg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, r);
  vg.addColorStop(0, 'rgba(8,6,4,0)');
  vg.addColorStop(0.65, `rgba(4,3,2,${phase * 0.35})`);
  vg.addColorStop(1, `rgba(0,0,0,${phase * 0.8})`);
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════
// DRAW: LAST LIGHT (Stage VI)
// ═══════════════════════════════════════════════════════
function drawLastLight(sp) {
  const a = Math.max(0, 1 - sp * 1.55);
  if (a < 0.003) return;
  const r = Math.min(W, H) * (0.16 + Math.sin(gt * 0.11) * 0.04) * a;
  const lg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, r);
  lg.addColorStop(0, `rgba(220,190,130,${a * 0.52})`);
  lg.addColorStop(0.5, `rgba(140,100,50,${a * 0.16})`);
  lg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = lg; ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════
// DRAW: GRAIN (drawn last on offscreen canvas, composited)
// ═══════════════════════════════════════════════════════
let grainRefreshCounter = 0;
function drawGrain(amount) {
  if (amount < 0.01 || !grainBuf) return;
  grainRefreshCounter++;
  // Refresh grain every 3 frames for performance but varied noise
  if (grainRefreshCounter % 3 === 0) refreshGrain(amount);
  ctx.globalAlpha = 1.0;
  ctx.drawImage(grainBuf, 0, 0);
}

// ═══════════════════════════════════════════════════════
// INTERACTION SYSTEM
// ═══════════════════════════════════════════════════════
function spawnRipple(x, y, size, dur) {
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.left = x + 'px'; el.style.top = y + 'px';
  el.style.setProperty('--rw', size + 'px');
  el.style.setProperty('--rd', dur + 's');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 0.15) * 1000);
}

// Dancer hit test — larger hit area, uses actual screen position
function hitDancer(mx2, my2) {
  const BASE_H = H * 0.055;
  const hitR   = BASE_H * 1.4;
  let best = null, bestD = Infinity;
  dancers.forEach(d => {
    if (!d.alive) return;
    const ox = d.orbitR * W * Math.cos(d.phase + d.side * Math.PI);
    const oy = d.orbitR * H * Math.sin(d.phase + d.side * Math.PI) * 0.35;
    const sx = d.cx * W + ox;
    const sy = d.cy * H + oy;
    const dist = Math.hypot(mx2 - sx, my2 - sy);
    if (dist < hitR && dist < bestD) { best = d; bestD = dist; }
  });
  return best;
}

function handleClick(ex, ey) {
  if (!running) return;
  const s = STAGES[sIdx];
  const delay = sIdx >= 3 ? 300 + sIdx * 120 + Math.random() * 200 : 0;

  setTimeout(() => {
    switch (s.mode) {
      case 'full':
      case 'partial': {
        const d = hitDancer(ex, ey);
        if (d) {
          d.glowing = 1.0;

          // Boost orbital speed — applied to both dancers in the pair
          const boostAmt = 0.045 + Math.random() * 0.015;
          dancers.forEach(other => {
            if (other.cx === d.cx && other.cy === d.cy) { // same pair
              other.boost = (other.boost || 0) + boostAmt;
              // Stage II: boost occasionally fights itself — one partner gets less
              if (sIdx === 1 && Math.random() < 0.3) other.boost *= 0.5;
            }
          });

          spawnRipple(ex, ey, 70,  0.55);
          spawnRipple(ex, ey, 130, 0.95);

          if (sIdx === 0) {
            playChord(ROOT * 2, [0, 4, 7, 12], 0.068, 2.2);
          } else {
            const semis = Math.random() < 0.25 ? [0, 3, 7, 11] : [0, 4, 7, 12];
            playChord(ROOT * 2, semis, 0.062, 2.0);
            if (Math.random() < 0.22) setTimeout(() => playNoiseBurst(0.08, 0.018), 600);
          }
        } else {
          spawnRipple(ex, ey, 55, 0.55);
          const semi = PENT[Math.floor(Math.random() * PENT.length)];
          playTone(semiHz(semi, ROOT * 2, s.pitch), 0.05, 1.3, 'sine', s.det * 0.3);
          if (sIdx === 1 && Math.random() < 0.22) playNoiseBurst(0.1, 0.022);
        }
        break;
      }
      case 'catch': {
        const d2 = hitDancer(ex, ey);
        if (d2) {
          d2.glowing = 0.55;
          // Weak, unreliable boost
          d2.boost = (d2.boost || 0) + 0.012 + Math.random() * 0.008;
        }
        spawnRipple(ex, ey, 45, 0.45);
        const wrongSemi = MOTIF[Math.floor(Math.random() * MOTIF.length)] - 3;
        playTone(semiHz(wrongSemi, ROOT, s.pitch), 0.038, 0.9, 'triangle', 140);
        setTimeout(() => playNoiseBurst(0.07, 0.018), 180);
        break;
      }
      case 'question': {
        spawnRipple(ex, ey, 36, 0.38);
        playNoiseBurst(0.14 + Math.random() * 0.09, 0.028 + Math.random() * 0.025);
        break;
      }
      case 'none': {
        setTimeout(() => spawnRipple(ex, ey, 18 + Math.random() * 14, 1.8), 1300 + Math.random() * 1800);
        break;
      }
    }
  }, delay);
}

canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
document.addEventListener('contextmenu', e => e.preventDefault());

// ── CATCH WORDS (Stage 3) ──────────────────────────────
const CATCH_WORDS = [
  'her name','the garden','Sunday','always','1962','my mother',
  'the key','before','his voice','roses','the road','remember',
  'where is','Margaret','the house','after dinner','winter','Geoffrey',
];

function spawnCatchWord() {
  if (sIdx !== 2) return;
  const word = CATCH_WORDS[(Math.random() * CATCH_WORDS.length) | 0];
  const el = document.createElement('div');
  el.className = 'fword catchable';
  el.textContent = word;
  el.style.fontSize = (13 + Math.random() * 16) + 'px';
  el.style.left = (7 + Math.random() * 76) + '%';
  el.style.top  = (12 + Math.random() * 50) + '%';
  el.style.setProperty('--tx', ((Math.random() - 0.5) * 55) + 'px');
  el.style.setProperty('--ty', (45 + Math.random() * 65) + 'px');
  el.style.setProperty('--r0', ((Math.random() - 0.5) * 8) + 'deg');
  el.style.setProperty('--r1', ((Math.random() - 0.5) * 22) + 'deg');
  const dur = 5 + Math.random() * 7;
  el.style.setProperty('--dur', dur + 's');
  let caught = false;
  el.addEventListener('click', e => {
    e.stopPropagation();
    if (caught) return; caught = true;
    el.style.animation = 'none';
    el.style.color = 'rgba(240,220,155,0.72)';
    el.style.textShadow = '0 0 22px rgba(200,169,110,0.55)';
    el.style.transition = 'opacity 2.4s ease, color 2.4s ease, text-shadow 2.4s ease';
    const semi = MOTIF[(Math.random() * MOTIF.length) | 0];
    playChord(ROOT * 2, [semi, semi + 4], 0.058, 1.6);
    spawnRipple(e.clientX, e.clientY, 74, 0.85);
    // Dissolves 2× faster
    setTimeout(() => {
      el.style.opacity = '0'; el.style.color = 'rgba(200,169,110,0.01)';
      setTimeout(() => { playNoiseBurst(0.18, 0.038); el.remove(); }, 2500);
    }, 1600);
  });
  document.body.appendChild(el);
  setTimeout(() => { if (!caught) el.remove(); }, dur * 1000 + 400);
}

// ── MEMORY QUESTION (Stage 4) ──────────────────────────
const QS = [
  { q: 'What is her name?',             ans: ['Eleanor','Margaret','Dorothy','Alice','Rose','Vera'] },
  { q: 'Where did you live?',            ans: ['the white house','the cottage','Elmfield','number seven'] },
  { q: 'What year were you married?',   ans: ['1962','1958','1965','1971','1954'] },
  { q: 'What was the name of your dog?',ans: ['Barley','Biscuit','Patch','Rufus','Charlie'] },
];

function showQuestion() {
  if (sIdx !== 3) return;
  const mq = document.getElementById('mem-q');
  const q  = QS[(Math.random() * QS.length) | 0];
  const ans = [...q.ans].sort(() => Math.random() - 0.5).slice(0, 4);
  mq.querySelector('.qtext').textContent = q.q;
  const optsEl = mq.querySelector('.opts');
  optsEl.innerHTML = '';
  ans.forEach(a => {
    const corrupt = Math.random() < 0.38;
    const display = corrupt ? scramble(a, 0.38) : a;
    const sp = document.createElement('span');
    sp.className = 'opt'; sp.textContent = display;
    sp.addEventListener('click', e => {
      e.stopPropagation();
      if (!corrupt) {
        sp.style.color = 'rgba(240,220,150,0.92)'; sp.style.borderColor = 'rgba(200,169,110,0.55)';
        playChord(ROOT * 2, [0, 4, 7], 0.068, 2.2);
        spawnRipple(e.clientX, e.clientY, 88, 1.0);
        setTimeout(() => { playNoiseBurst(0.28, 0.055); mq.style.opacity = '0'; mq.style.pointerEvents = 'none';
          setTimeout(() => showQuestion(), 3800); }, 1400);
      } else {
        playNoiseBurst(0.22, 0.065);
        spawnRipple(e.clientX, e.clientY, 50, 0.4);
        optsEl.querySelectorAll('.opt').forEach(o => { o.textContent = scramble(o.textContent, 0.55); });
      }
    });
    optsEl.appendChild(sp);
  });
  mq.style.pointerEvents = 'all';
  requestAnimationFrame(() => { mq.style.opacity = '1'; });
}

function scramble(str, amt) {
  const ch = 'abcdefghijklmnopqrstuvwxyz ';
  return str.split('').map(c => c === ' ' ? ' ' : Math.random() < amt ? ch[(Math.random() * ch.length) | 0] : c).join('');
}

// ── TYPEWRITER (Stage 5) ───────────────────────────────
const WRONG = 'qwertyuiopasdfghjklzxcvbnm0123456789 ';
let twText = '', twTimers = [], twActive = false;

function initTW() {
  twActive = true; twText = '';
  const wrap = document.getElementById('tw-wrap');
  const disp = document.getElementById('tw-display');
  const hi   = document.getElementById('tw-hidden');
  wrap.style.opacity = '1'; wrap.style.pointerEvents = 'all';
  disp.textContent = '';
  hi.value = ''; hi.focus();
  hi.addEventListener('input', onTWInput);
  hi.addEventListener('keydown', onTWKey);
  document.addEventListener('click', () => { if (twActive) hi.focus(); }, { passive: true });
}

function onTWKey(e) {
  if (!twActive || sIdx !== 4) return;
  if (e.key === 'Backspace') { twText = twText.slice(0, -1); renderTW(); e.preventDefault(); }
}

function onTWInput(e) {
  if (!twActive || sIdx !== 4) return;
  const hi = document.getElementById('tw-hidden');
  const raw = hi.value; hi.value = '';
  if (!raw) return;
  raw.split('').forEach(c => {
    const wrong = Math.random() < 0.22;
    twText += wrong ? WRONG[(Math.random() * WRONG.length) | 0] : c;
    if (wrong) setTimeout(() => playNoiseBurst(0.04, 0.012), 40);
    // Each char decays
    const pos = twText.length;
    twTimers.push(setTimeout(() => {
      const i = Math.min(pos - 1, twText.length - 1);
      if (i >= 0) { twText = twText.slice(0, i) + twText.slice(i + 1); renderTW(); }
    }, 4200 + Math.random() * 5500));
  });
  renderTW();
}

function renderTW() {
  const el = document.getElementById('tw-display');
  if (!el) return;
  // Visual corruption layer — flicker random chars display
  el.textContent = twText.split('').map(c => Math.random() < 0.04 ? WRONG[(Math.random() * WRONG.length) | 0] : c).join('');
}

function stopTW() {
  twActive = false;
  twTimers.forEach(t => clearTimeout(t)); twTimers = [];
  const wrap = document.getElementById('tw-wrap');
  if (wrap) { wrap.style.opacity = '0'; wrap.style.pointerEvents = 'none'; }
  const hi = document.getElementById('tw-hidden');
  hi.removeEventListener('input', onTWInput);
  hi.removeEventListener('keydown', onTWKey);
}

// ── WORD FRAGMENTS ─────────────────────────────────────
const SWORDS = [

  ['losing','holding','still','her name','last year','the children','wait','Tuesday'],

  ['confusion','the face','who','not','I cannot','where','darkness','which room'],

];

function spawnWord(idx) {

// ═══════════════════════════════════════════════════════
// AUDIO PER STAGE
// ═══════════════════════════════════════════════════════
function applyStageAudio(s) {
  if (!AC) return;
  const T = 2.2;
  rvWet.gain.linearRampToValueAtTime(s.rev, AC.currentTime + T);
  rvDry.gain.linearRampToValueAtTime(1 - s.rev * 0.52, AC.currentTime + T);
  distWS.curve = distCurve(s.noise * 0.78);
  stopNoise(); if (s.noise > 0.04) startNoise(s.noise);
  if (melTimer) clearInterval(melTimer);
  const intv = Math.max(240, 920 * s.tempo * (1 + (1 - s.mel) * 2.1));
  melTimer = setInterval(() => {
    if (s.mel < 0.01) return;
    const semi = MOTIF[(Math.random() * MOTIF.length) | 0];
    playTone(semiHz(semi, ROOT * 2, s.pitch), 0.068 * s.mel, 1.5 + Math.random() * 0.9,
      s.clarity > 0.5 ? 'sine' : 'triangle', s.det);
    if (s.clarity > 0.28 && Math.random() < 0.38)
      playTone(semiHz(semi, ROOT * 4, s.pitch), 0.028 * s.mel, 0.7, 'sine', s.det * 0.5);
  }, intv);
  if (crackTimer) clearInterval(crackTimer);
  const cRate = Math.max(55, 580 - s.noise * 400);
  crackTimer = setInterval(() => crackle(1 + s.noise), cRate);
}

// ═══════════════════════════════════════════════════════
// STAGE TRANSITION
// ═══════════════════════════════════════════════════════
function toStage(idx) {
  inTransition = true;
  const s = STAGES[idx];
  applyStageAudio(s);

  // Cursor lag
  lagFrames = s.lag; curLerp = s.lerp;
  curHidden = idx === 5;

  // Screen flash on rupture+
  if (idx >= 3) {
    const fl = document.getElementById('flash');
    fl.style.transition = 'opacity .06s'; fl.style.opacity = '.07';
    setTimeout(() => { fl.style.transition = 'opacity 2s ease'; fl.style.opacity = '0'; }, 75);
  }

  // Hide/stop previous interaction modes
  const mq = document.getElementById('mem-q');
  mq.style.opacity = '0'; mq.style.pointerEvents = 'none';
  if (twActive) stopTW();

  // Word timer
  if (wordTimer) clearInterval(wordTimer);
  const wi = Math.max(850, 5500 - idx * 680);
  wordTimer = setInterval(() => spawnWord(idx), wi);
  spawnWord(idx);

  // Mode setup
  if (idx === 2) {
    if (catchTimer) clearInterval(catchTimer);
    catchTimer = setInterval(() => { if (sIdx === 2) spawnCatchWord(); else clearInterval(catchTimer); }, 2100);
    setTimeout(spawnCatchWord, 1800);
  }
  if (idx === 3) setTimeout(() => { if (sIdx === 3) showQuestion(); }, 3200);
  if (idx === 4) setTimeout(() => { if (sIdx === 4) initTW(); }, 3400);

  // Hint
  const hint = document.getElementById('hint');
  hint.textContent = s.hint;
  if (s.hint) {
    hint.style.opacity = '0';
    setTimeout(() => { hint.style.opacity = '1'; }, 1600);
    setTimeout(() => { hint.style.opacity = '0'; }, 9000);
  }

  // Stage labels — with glitch for late stages
  updateLabels(s, idx);
  setTimeout(() => { inTransition = false; }, 200);
}

function updateLabels(s, idx) {
  const ne = document.getElementById('stage-num');
  const te = document.getElementById('stage-title');
  const se = document.getElementById('stage-sub');
  [ne, te, se].forEach(e => { e.style.transition = 'opacity 0.4s ease'; e.style.opacity = '0'; });
  setTimeout(() => {
    ne.textContent = s.num; te.textContent = s.title; se.textContent = s.sub;
    if (idx >= 3) {
      let it = 0;
      const sc = setInterval(() => {
        te.textContent = s.title.split('').map((c, i) => {
          if (c === ' ') return ' ';
          return Math.random() < (idx - 2) * 0.16 && it < 28 ? 'abcdefghijklmnopqrstuvwxyz'[(Math.random() * 26) | 0] : c;
        }).join('');
        if (it++ > 36) clearInterval(sc);
      }, 75);
    }
    [ne, te, se].forEach(e => { e.style.transition = 'opacity 1.8s ease'; e.style.opacity = '1'; });
    const hideMs = idx < 2 ? 9500 : 6000;
    setTimeout(() => [ne, te, se].forEach(e => { e.style.transition = 'opacity 3s ease'; e.style.opacity = '0'; }), hideMs);
  }, 1400);
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER LOOP
// ═══════════════════════════════════════════════════════
let lastTs = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTs, 80); lastTs = ts;
  gt += dt * 0.001;
  sElapsed += dt;

  const s = STAGES[sIdx];
  const sp = Math.min(1, sElapsed / s.dur);

  // Progress
  let done = 0; for (let i = 0; i < sIdx; i++) done += STAGES[i].dur;
  const totalDur = STAGES.reduce((a, x) => a + x.dur, 0);
  document.getElementById('progress-bar').style.width = (Math.min(1, (done + sElapsed) / totalDur) * 100) + '%';

  if (!running) return;

  // ── RENDER ────────────────────────────────────────────────
  // 1. Background solid
  drawBg(s);
  // 2. Floor tiles
  if (sIdx <= 4) drawFloor(s);
  // 3. Chandelier
  drawChandelier(s);
  // 4. Smear layer
  drawSmear(s);
  // 5. Atmospheric motes
  drawMotes(s);
  // 6. Ghost geometry (Stage 2+)
  if (sIdx >= 1) drawGhosts(s);
  // 7. DANCERS — prominently visible
  drawDancers(s);
  // 8. Scanlines
  drawScanlines(s);
  // 9. Void crush (Stage 5+)
  drawVoid(s, sp);
  // 10. Final light (Stage 6)
  if (sIdx === 5) drawLastLight(sp);
  // 11. Grain LAST — composited over everything
  drawGrain(s.grain);

  // Stage advance
  if (!inTransition && sElapsed >= s.dur) {
    if (sIdx < STAGES.length - 1) {
      sIdx++; sElapsed = 0; toStage(sIdx);
    } else {
      running = false;
      setTimeout(showFinal, 3200);
    }
  }
}

// ═══════════════════════════════════════════════════════
// HARRY SEQUENCE + CREDITS
// ═══════════════════════════════════════════════════════
function showFinal() {
  // Silence music slowly
  if (AC) masterGain.gain.linearRampToValueAtTime(0, AC.currentTime + 8);

  // Setup fin canvas
  const fc = document.getElementById('fin-canvas');
  fc.width  = W; fc.height = H;
  fc.style.display = 'block';
  const fx = fc.getContext('2d');

  // Phase timing (ms from sequence start)
  // 0–3000   : static only, face barely perceptible
  // 3000–7000: face emerges through static, gains definition
  // 7000–10000: "I" appears letter by letter
  // 10000–13500: "am" appears
  // 13500–17000: "Harry" appears, lingers
  // 17000–26000: slow deformation — face warps, melts, stretches
  // 26000–30000: face dissolves back into static, static thins
  // 30000–35000: black void, credits roll
  // 35000+     : restart button appears

  const SEQ_START = performance.now();

  // ── FACE DRAWING ENGINE ──────────────────────────────
  // Harry: a dignified older man, painted entirely with canvas primitives
  // cx, cy = face centre, scale = radius of head
  function drawHarryFace(fx, cx, cy, scale, deform, alpha) {
    fx.save();
    fx.globalAlpha = Math.max(0, Math.min(1, alpha));

    const d = deform; // 0 = normal, 1 = fully deformed

    // ── Noise warp function — displaces points as d increases
    function wp(x, y, mag) {
      const m = mag * d;
      return [
        x + Math.sin(y * 0.018 + gt * 1.1) * m + Math.cos(x * 0.022 + gt * 0.7) * m * 0.6,
        y + Math.cos(x * 0.015 + gt * 0.9) * m + Math.sin(y * 0.019 + gt * 1.3) * m * 0.7,
      ];
    }

    // Colour shifts from warm flesh → sickly grey-green as deform increases
    function flesh(baseR, baseG, baseB, a) {
      const r = (baseR - d * 55) | 0;
      const g = (baseG - d * 30) | 0;
      const b = (baseB + d * 40) | 0;
      return `rgba(${Math.max(0,r)},${Math.max(0,g)},${Math.max(0,b)},${a})`;
    }

    // ── HEAD SHAPE ────────────────────────────────────
    const headW = scale * (1 + d * 0.35);
    const headH = scale * 1.28 * (1 + d * 0.2);
    const [hcx, hcy] = wp(cx, cy, scale * 0.25);

    const headGrad = fx.createRadialGradient(hcx - scale*0.15, hcy - scale*0.25, 0, hcx, hcy, headW * 1.1);
    headGrad.addColorStop(0, flesh(195, 158, 118, 0.95));
    headGrad.addColorStop(0.6, flesh(170, 130, 90, 0.9));
    headGrad.addColorStop(1, flesh(110, 80, 55, 0.6));

    fx.beginPath();
    // Distort head outline with warp
    const pts = 32;
    for (let i = 0; i <= pts; i++) {
      const a = (i / pts) * Math.PI * 2;
      const rx2 = headW * (1 + d * Math.sin(a * 3 + gt * 0.8) * 0.18);
      const ry2 = headH * (1 + d * Math.cos(a * 2 + gt * 0.6) * 0.14);
      const [px, py] = wp(hcx + Math.cos(a) * rx2, hcy + Math.sin(a) * ry2, scale * 0.08);
      i === 0 ? fx.moveTo(px, py) : fx.lineTo(px, py);
    }
    fx.closePath();
    fx.fillStyle = headGrad;
    fx.fill();

    // ── SHADOW / DEPTH ────────────────────────────────
    const shadowG = fx.createRadialGradient(hcx + scale*0.3, hcy + scale*0.35, 0, hcx, hcy, headW * 1.3);
    shadowG.addColorStop(0, 'rgba(0,0,0,0)');
    shadowG.addColorStop(0.7, `rgba(0,0,0,${0.22 + d * 0.3})`);
    shadowG.addColorStop(1, `rgba(0,0,0,${0.55 + d * 0.3})`);
    fx.beginPath();
    for (let i = 0; i <= pts; i++) {
      const a = (i / pts) * Math.PI * 2;
      const rx2 = headW * 1.05, ry2 = headH * 1.05;
      const [px, py] = wp(hcx + Math.cos(a) * rx2, hcy + Math.sin(a) * ry2, scale * 0.05);
      i === 0 ? fx.moveTo(px, py) : fx.lineTo(px, py);
    }
    fx.closePath();
    fx.fillStyle = shadowG; fx.fill();

    // ── NECK ──────────────────────────────────────────
    const [nl, nr, nb] = [
      wp(hcx - scale*0.18, hcy + headH*0.88, scale * 0.12),
      wp(hcx + scale*0.18, hcy + headH*0.88, scale * 0.12),
      wp(hcx, hcy + headH*1.25 + d*scale*0.3, scale * 0.15),
    ];
    fx.beginPath();
    fx.moveTo(...nl); fx.lineTo(...nr); fx.lineTo(...nb); fx.closePath();
    fx.fillStyle = flesh(170, 128, 88, 0.85); fx.fill();

    // ── EYES ──────────────────────────────────────────
    const eyeY = hcy - scale * (0.12 - d * 0.08);
    const eyeSep = scale * (0.32 + d * 0.15);
    const eyeScaleY = 1 + d * 0.7; // eyes stretch vertically when deforming

    [[-1, 0], [1, 0]].forEach(([side]) => {
      const [ex, ey] = wp(hcx + side * eyeSep, eyeY, scale * 0.18);
      const ew = scale * 0.21, eh = scale * 0.1 * eyeScaleY;

      // White
      fx.save();
      fx.beginPath();
      fx.ellipse(ex, ey, ew, eh, d * side * 0.4, 0, Math.PI*2);
      fx.fillStyle = flesh(230, 225, 218, 0.92); fx.fill();

      // Iris
      const [irx, iry] = wp(ex, ey, scale * 0.04);
      fx.beginPath();
      fx.ellipse(irx, iry, ew * 0.52, eh * 0.85, 0, 0, Math.PI*2);
      fx.fillStyle = flesh(60, 45, 28, 0.95); fx.fill();

      // Pupil
      fx.beginPath();
      fx.ellipse(irx, iry, ew * 0.26, eh * 0.55, 0, 0, Math.PI*2);
      fx.fillStyle = `rgba(5,3,2,0.98)`; fx.fill();

      // Eyelid crease
      fx.beginPath();
      fx.ellipse(ex, ey - eh*0.5, ew, eh * (0.5 + d*0.5), d * side * 0.3, Math.PI, Math.PI*2);
      fx.strokeStyle = flesh(130, 95, 65, 0.7);
      fx.lineWidth = scale * 0.025; fx.stroke();

      // Ageing wrinkles (corner)
      for (let w = 0; w < 3; w++) {
        const [wx, wy] = wp(ex + side*(ew + scale*0.03), ey + scale*0.02 + w*scale*0.05, scale*0.06*d);
        fx.beginPath();
        fx.moveTo(ex + side*ew, ey + w*scale*0.04);
        fx.lineTo(wx + side*scale*(0.06+w*0.04), wy);
        fx.strokeStyle = flesh(130, 95, 65, 0.25 + d*0.1);
        fx.lineWidth = scale * 0.015; fx.stroke();
      }
      fx.restore();
    });

    // ── BROW RIDGE ────────────────────────────────────
    [[-1], [1]].forEach(([side]) => {
      const bx = hcx + side * eyeSep;
      const by = eyeY - scale * (0.16 + d * 0.04);
      fx.beginPath();
      fx.moveTo(...wp(bx - side*scale*0.22, by, scale*0.1));
      fx.bezierCurveTo(
        ...wp(bx, by - scale*(0.06+d*0.04), scale*0.1),
        ...wp(bx + side*scale*0.16, by, scale*0.1),
        ...wp(bx + side*scale*0.25, by + scale*0.04, scale*0.1)
      );
      fx.strokeStyle = flesh(85, 62, 40, 0.7 + d*0.2);
      fx.lineWidth = scale * (0.04 + d*0.03); fx.stroke();

      // Grey brow hairs
      for (let h = 0; h < 8; h++) {
        const hx = bx + (h/7 - 0.5) * scale * 0.42 * side;
        const [hbx, hby] = wp(hx, by - scale*0.02, scale*0.05);
        fx.beginPath();
        fx.moveTo(hbx, hby);
        fx.lineTo(hbx + side*scale*(0.03+d*0.06), hby - scale*(0.04+d*0.05));
        fx.strokeStyle = flesh(130, 115, 100, 0.55);
        fx.lineWidth = scale*0.018; fx.stroke();
      }
    });

    // ── NOSE ──────────────────────────────────────────
    const noseTopY = eyeY + scale * 0.08;
    const noseBotY = hcy + scale * (0.22 + d * 0.18);
    const [ntx, nty] = wp(hcx, noseTopY, scale * 0.12);
    const [nbx, nby] = wp(hcx, noseBotY, scale * 0.18);

    fx.beginPath();
    fx.moveTo(ntx, nty);
    fx.bezierCurveTo(
      ...wp(hcx - scale*0.06, noseTopY + scale*0.12, scale*0.1),
      ...wp(hcx - scale*0.07, noseBotY - scale*0.05, scale*0.12),
      ...wp(hcx - scale*(0.14+d*0.08), noseBotY, scale*0.14)
    );
    fx.moveTo(ntx, nty);
    fx.bezierCurveTo(
      ...wp(hcx + scale*0.06, noseTopY + scale*0.12, scale*0.1),
      ...wp(hcx + scale*0.07, noseBotY - scale*0.05, scale*0.12),
      ...wp(hcx + scale*(0.14+d*0.08), noseBotY, scale*0.14)
    );
    fx.strokeStyle = flesh(120, 85, 58, 0.65 + d*0.2);
    fx.lineWidth = scale * (0.028 + d*0.02); fx.stroke();

    // Nostril shadows
    [[-1],[1]].forEach(([side]) => {
      const [nx, ny] = wp(hcx + side*scale*(0.1+d*0.06), noseBotY - scale*0.02, scale*0.08);
      fx.beginPath();
      fx.ellipse(nx, ny, scale*(0.06+d*0.04), scale*(0.04+d*0.03), side*0.3, 0, Math.PI*2);
      fx.fillStyle = flesh(60, 40, 25, 0.65); fx.fill();
    });

    // ── MOUTH ─────────────────────────────────────────
    const mouthY = hcy + scale * (0.42 + d * 0.2);
    const mouthW = scale * (0.3 + d * 0.22);
    // Deform mouth — one side droops more
    const [mlx, mly] = wp(hcx - mouthW, mouthY + d * scale * 0.12, scale * 0.14);
    const [mrx, mry] = wp(hcx + mouthW, mouthY - d * scale * 0.06, scale * 0.14);
    const [mcx2, mcy2] = wp(hcx, mouthY + scale*(0.04 + d*0.08), scale*0.1);

    fx.beginPath();
    fx.moveTo(mlx, mly);
    fx.bezierCurveTo(
      ...wp(hcx - mouthW*0.4, mouthY + scale*(0.01+d*0.05), scale*0.08),
      ...wp(hcx + mouthW*0.4, mouthY + scale*(0.01-d*0.05), scale*0.08),
      mrx, mry
    );
    fx.strokeStyle = flesh(100, 68, 48, 0.85);
    fx.lineWidth = scale * (0.03 + d*0.025); fx.stroke();

    // Lower lip
    fx.beginPath();
    fx.moveTo(mlx, mly);
    fx.bezierCurveTo(...wp(hcx-mouthW*0.3, mouthY+scale*(0.08+d*0.15), scale*0.12),
      ...wp(hcx+mouthW*0.3, mouthY+scale*(0.06+d*0.1), scale*0.12), mrx, mry);
    fx.fillStyle = flesh(155, 110, 80, 0.45); fx.fill();

    // Mouth shadow / opening (deform makes it gape)
    if (d > 0.15) {
      fx.beginPath();
      fx.moveTo(mlx, mly);
      fx.bezierCurveTo(
        ...wp(hcx-mouthW*0.5, mouthY+scale*(0.04+d*0.18), scale*0.12),
        ...wp(hcx+mouthW*0.5, mouthY+scale*(0.03+d*0.12), scale*0.12),
        mrx, mry
      );
      fx.closePath();
      fx.fillStyle = `rgba(15,8,4,${d*0.7})`; fx.fill();
    }

    // Lip crease lines
    for (let l = 0; l < 3; l++) {
      const [lx2, ly2] = wp(hcx + (l-1)*mouthW*0.5, mouthY - scale*(0.04+d*0.08), scale*0.06);
      fx.beginPath();
      fx.moveTo(lx2, ly2);
      fx.lineTo(...wp(lx2 + (l-1)*scale*0.04, mouthY - scale*(0.12+d*0.12), scale*0.05));
      fx.strokeStyle = flesh(120, 85, 60, 0.3);
      fx.lineWidth = scale*0.015; fx.stroke();
    }

    // ── EAR ───────────────────────────────────────────
    [[-1],[1]].forEach(([side]) => {
      const earX = hcx + side * headW * (1.0 + d * 0.12);
      const earY = hcy - scale * 0.08;
      const [eax, eay] = wp(earX, earY, scale * 0.15);
      fx.beginPath();
      fx.ellipse(eax, eay, scale*(0.08+d*0.05), scale*(0.16+d*0.06), side*0.15, 0, Math.PI*2);
      fx.fillStyle = flesh(175, 132, 92, 0.85); fx.fill();
      fx.strokeStyle = flesh(130, 90, 60, 0.5);
      fx.lineWidth = scale*0.02; fx.stroke();
    });

    // ── FOREHEAD LINES ────────────────────────────────
    for (let l = 0; l < 4; l++) {
      const ly2 = hcy - scale*(0.45 - l*0.1) + d*scale*Math.sin(l+gt*0.5)*0.15;
      fx.beginPath();
      const [lsx, lsy] = wp(hcx - scale*(0.32-l*0.04), ly2, scale*(0.06+d*0.12));
      const [lex, ley] = wp(hcx + scale*(0.32-l*0.04), ly2, scale*(0.06+d*0.12));
      fx.moveTo(lsx, lsy); fx.lineTo(lex, ley);
      fx.strokeStyle = flesh(130, 95, 65, 0.18 + d*0.12);
      fx.lineWidth = scale*(0.014+l*0.006); fx.stroke();
    }

    // ── AGEING JOWLS (strengthen with deform) ─────────
    [[-1],[1]].forEach(([side]) => {
      const jx = hcx + side*scale*(0.28+d*0.18);
      const jy = hcy + scale*(0.5 + d*0.25);
      const [jx2, jy2] = wp(jx, jy, scale*0.18);
      const jg = fx.createRadialGradient(jx2, jy2, 0, jx2, jy2, scale*0.25);
      jg.addColorStop(0, flesh(145, 108, 74, 0.35 + d*0.25));
      jg.addColorStop(1, 'rgba(0,0,0,0)');
      fx.beginPath();
      fx.ellipse(jx2, jy2, scale*(0.18+d*0.12), scale*(0.12+d*0.1), side*0.3, 0, Math.PI*2);
      fx.fillStyle = jg; fx.fill();
    });

    // ── HAIR ──────────────────────────────────────────
    const hairY = hcy - headH * (0.82 + d * 0.15);
    const hairG = fx.createLinearGradient(hcx, hairY, hcx, hcy - headH*0.4);
    hairG.addColorStop(0, flesh(65, 58, 52, 0.95));
    hairG.addColorStop(0.5, flesh(80, 72, 65, 0.9));
    hairG.addColorStop(1, 'rgba(0,0,0,0)');

    fx.beginPath();
    const hairPts = 20;
    for (let i = 0; i <= hairPts; i++) {
      const a = (i / hairPts - 0.5) * Math.PI;
      const hr = headW * (1.05 + d * 0.1 * Math.sin(a * 2.5 + gt));
      const [hpx, hpy] = wp(hcx + Math.cos(a)*hr, hcy - headH*0.65 + Math.sin(a)*headH*0.45, scale*0.1);
      i === 0 ? fx.moveTo(hpx, hpy) : fx.lineTo(hpx, hpy);
    }
    fx.lineTo(...wp(hcx + headW, hcy - headH*0.2, scale*0.08));
    fx.lineTo(...wp(hcx - headW, hcy - headH*0.2, scale*0.08));
    fx.closePath();
    fx.fillStyle = hairG; fx.fill();

    fx.restore();
  }

  // ── STATIC FIELD ────────────────────────────────────
  function drawFinalStatic(fx, amount) {
    if (amount < 0.01) return;
    const id = fx.createImageData(W, H);
    const d2 = id.data;
    const step = Math.max(1, (4 - amount * 3) | 0);
    for (let i = 0; i < d2.length; i += 4 * step) {
      if (Math.random() < amount) {
        const v = (Math.random() * 220) | 0;
        d2[i] = d2[i+1] = d2[i+2] = v;
        d2[i+3] = (Math.random() * 180 * amount) | 0;
      }
    }
    fx.putImageData(id, 0, 0);
  }

  // ── CREDITS DATA ─────────────────────────────────────
  const CREDITS = [
    { text: 'Everywhere at the End of Time', size: 'large', style: 'title' },
    { text: '', size: 'gap' },
    { text: 'Inspired by', size: 'label' },
    { text: 'The Caretaker', size: 'name' },
    { text: 'Leyland James Kirby', size: 'sub' },
    { text: '', size: 'gap' },
    { text: 'Visual Experience', size: 'label' },
    { text: 'Claude Sonnet', size: 'name' },
    { text: 'Anthropic', size: 'sub' },
    { text: '', size: 'gap' },
    { text: 'Original Album Art', size: 'label' },
    { text: 'Ivan Seal', size: 'name' },
    { text: '', size: 'gap' },
    { text: 'Dementia affects an estimated', size: 'label' },
    { text: '57 million people worldwide', size: 'name' },
    { text: '', size: 'gap' },
    { text: 'in memory of all those', size: 'small' },
    { text: 'who found themselves here', size: 'small' },
    { text: '', size: 'gap' },
    { text: '', size: 'gap' },
    { text: '— Harry —', size: 'name' },
  ];

  // ── MAIN SEQUENCE LOOP ───────────────────────────────
  let finRunning = true;
  let creditScroll = null;

  function finLoop() {
    if (!finRunning) return;
    requestAnimationFrame(finLoop);

    const elapsed = performance.now() - SEQ_START;
    const cx2 = W / 2, cy2 = H / 2;
    const scale = Math.min(W, H) * 0.22;

    // Clear
    fx.fillStyle = 'rgb(5,4,3)';
    fx.fillRect(0, 0, W, H);

    // ── PHASE 1: 0–3000ms — dense static, face hint ────
    if (elapsed < 3000) {
      const p = elapsed / 3000;
      drawFinalStatic(fx, 0.85 - p * 0.2);
      drawHarryFace(fx, cx2, cy2, scale, 0, p * 0.08);

    // ── PHASE 2: 3000–7000ms — face emerges ────────────
    } else if (elapsed < 7000) {
      const p = (elapsed - 3000) / 4000;
      drawFinalStatic(fx, 0.65 - p * 0.45);
      drawHarryFace(fx, cx2, cy2, scale, 0, 0.08 + p * 0.82);

    // ── PHASE 3: 7000–17000ms — text appears ───────────
    } else if (elapsed < 17000) {
      const p = (elapsed - 7000) / 10000;
      drawFinalStatic(fx, 0.18 - p * 0.12);
      drawHarryFace(fx, cx2, cy2, scale, 0, 0.90 + p * 0.06);

      // "I am Harry" builds letter by letter
      const FULL = 'I am Harry.';
      const charTime = 10000 / FULL.length;
      const charsVisible = Math.min(FULL.length, ((elapsed - 7000) / charTime) | 0);
      const text = FULL.slice(0, charsVisible);

      fx.save();
      fx.font = `300 italic ${scale * 0.22}px 'Cormorant Garamond', Georgia, serif`;
      fx.textAlign = 'center';
      fx.textBaseline = 'middle';
      // Text sits just below face
      const textY = cy2 + scale * 1.55;
      // Subtle glow behind text
      fx.shadowColor = 'rgba(200,169,110,0.5)';
      fx.shadowBlur = scale * 0.3;
      fx.fillStyle = `rgba(240,232,216,${0.55 + p * 0.3})`;
      fx.fillText(text, cx2, textY);
      // Blinking cursor at end
      if (charsVisible < FULL.length && Math.floor(elapsed / 500) % 2 === 0) {
        fx.fillStyle = `rgba(200,169,110,0.6)`;
        fx.fillText('|', cx2 + fx.measureText(text).width / 2 + scale * 0.05, textY);
      }
      fx.restore();

    // ── PHASE 4: 17000–27000ms — deformation ───────────
    } else if (elapsed < 27000) {
      const p = (elapsed - 17000) / 10000;
      const deform = p * p; // ease in — slow start, accelerating

      drawFinalStatic(fx, 0.06 + p * 0.35);
      drawHarryFace(fx, cx2, cy2, scale, deform, 1.0 - p * 0.15);

      // "I am Harry." text — starts corrupting
      const textY = cy2 + scale * 1.55;
      const FULL = 'I am Harry.';
      const corrupted = FULL.split('').map(c => {
        if (c === ' ' || c === '.') return c;
        return Math.random() < p * 0.7 ? 'abcdefghijklmnopqrstuvwxyz'[(Math.random()*26)|0] : c;
      }).join('');
      fx.save();
      fx.font = `300 italic ${scale * 0.22}px 'Cormorant Garamond', Georgia, serif`;
      fx.textAlign = 'center'; fx.textBaseline = 'middle';
      fx.shadowColor = 'rgba(200,169,110,0.3)'; fx.shadowBlur = scale * 0.2;
      fx.fillStyle = `rgba(240,232,216,${0.85 - p * 0.75})`;
      fx.fillText(corrupted, cx2, textY);
      fx.restore();

    // ── PHASE 5: 27000–32000ms — dissolution ───────────
    } else if (elapsed < 32000) {
      const p = (elapsed - 27000) / 5000;
      drawFinalStatic(fx, 0.4 + p * 0.55);
      drawHarryFace(fx, cx2, cy2, scale, 1.0, (1 - p) * 0.85);

    // ── PHASE 6: 32000+ — black, then credits ──────────
    } else {
      const p = Math.min(1, (elapsed - 32000) / 2000);
      // Fade to pure black
      fx.fillStyle = `rgba(5,4,3,${p})`;
      fx.fillRect(0, 0, W, H);

      if (p >= 1 && !creditScroll) startCredits(fx);
    }
  }

  // ── CREDITS SEQUENCE ────────────────────────────────
  function startCredits(fx) {
    finRunning = false; // stop the face loop
    fc.style.display = 'none'; // hide the fin canvas
    // Run credits on the main canvas
    runCredits();
  }

  function runCredits() {
    const startT = performance.now();
    const LINE_H = Math.min(W, H) * 0.072;
    const totalH = CREDITS.reduce((acc, c) => acc + (c.size === 'gap' ? LINE_H * 0.8 : LINE_H * 1.2), 0);
    const scrollDur = totalH / (Math.min(W, H) * 0.00008); // speed

    function creditsLoop(ts) {
      const el2 = ts - startT;
      const scrollY = el2 * (Math.min(W, H) * 0.00009);

      // Background
      ctx.fillStyle = 'rgb(5,4,3)';
      ctx.fillRect(0, 0, W, H);

      // Subtle grain
      if (grainBuf) { ctx.globalAlpha = 0.18; ctx.drawImage(grainBuf, 0, 0); ctx.globalAlpha = 1; }

      // Draw credit lines
      let yOff = H + 80 - scrollY;
      CREDITS.forEach(line => {
        if (line.size === 'gap') { yOff += LINE_H * 0.8; return; }

        const sizes = { large: LINE_H * 0.9, name: LINE_H * 0.55, label: LINE_H * 0.32, sub: LINE_H * 0.28, small: LINE_H * 0.30, title: LINE_H * 0.85 };
        const sz = sizes[line.size] || LINE_H * 0.4;
        const isTitle = line.style === 'title';

        if (yOff > -LINE_H * 2 && yOff < H + LINE_H * 2) {
          ctx.save();
          ctx.font = `${isTitle ? '300' : '100'} ${isTitle ? 'italic' : 'normal'} ${sz}px '${isTitle ? 'Cormorant Garamond' : 'Lato'}', ${isTitle ? 'Georgia' : 'sans-serif'}`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

          const distFromCentre = Math.abs(yOff - H / 2) / (H / 2);
          const fadedAlpha = Math.max(0, 1 - distFromCentre * 1.4);

          if (isTitle || line.size === 'name') {
            ctx.shadowColor = 'rgba(200,169,110,0.2)'; ctx.shadowBlur = sz * 0.5;
            ctx.fillStyle = `rgba(240,232,216,${fadedAlpha * 0.75})`;
          } else if (line.size === 'label') {
            ctx.fillStyle = `rgba(200,169,110,${fadedAlpha * 0.5})`;
            ctx.font = `100 normal ${sz}px 'Lato', sans-serif`;
            // letter spacing via char-by-char
          } else {
            ctx.fillStyle = `rgba(130,115,100,${fadedAlpha * 0.55})`;
          }
          ctx.fillText(line.text, W / 2, yOff);
          ctx.restore();
        }
        yOff += LINE_H * 1.2;
      });

      // Vignette
      const vg = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.75);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.7)');
      ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

      const allGone = yOff < -LINE_H * 2;
      if (!allGone) {
        requestAnimationFrame(creditsLoop);
      } else {
        // Show restart
        setTimeout(() => document.getElementById('fin-btn').classList.add('s'), 800);
      }
    }
    requestAnimationFrame(creditsLoop);
    refreshGrain(0.15);
  }

  // Kick off
  requestAnimationFrame(finLoop);
}

// ═══════════════════════════════════════════════════════
// GATE
// ═══════════════════════════════════════════════════════
function showGate() {
  ['g0','g1','g2','g3'].forEach((id, i) =>
    setTimeout(() => { const el = document.getElementById(id); if (el) el.classList.add('s'); }, 800 + i * 1650)
  );
  setTimeout(() => {
    document.querySelector('.gbtn').classList.add('s');
    document.querySelector('.gwarn').classList.add('s');
  }, 800 + 4 * 1650);
}

document.getElementById('gbtn').addEventListener('click', () => {
  const gate = document.getElementById('gate');
  gate.style.transition = 'opacity 2.5s ease'; gate.style.opacity = '0';
  setTimeout(() => gate.remove(), 2600);

  initAudio();
  buildGrainBuffer();

  setTimeout(() => {
    masterGain.gain.linearRampToValueAtTime(0.82, AC.currentTime + 4);
    initScene();
    running = true;
    document.getElementById('progress-wrap').style.opacity = '1';
    toStage(0);
    requestAnimationFrame(loop);
  }, 900);
});

showGate();
</script>
</body>
